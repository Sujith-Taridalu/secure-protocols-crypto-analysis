<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-label="Crypto and secure protocol map">
  <rect width="1100" height="620" fill="#ffffff"/>
  <text x="550" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Secure Protocols &amp; Crypto Analysis Map</text>
  <text x="550" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#4b5563">Sanitized portfolio view: concepts, protocol behavior, and defensive reasoning</text>

  <rect x="70" y="125" width="260" height="120" rx="16" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="200" y="158" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#1f2937">Cryptography</text>
  <text x="200" y="190" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">RSA • DES/3DES • MAC</text>
  <text x="200" y="214" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">CBC vs ECB • PGP</text>

  <rect x="420" y="125" width="260" height="120" rx="16" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="550" y="158" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#1f2937">PKI / TLS</text>
  <text x="550" y="190" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Certificates • CA Trust</text>
  <text x="550" y="214" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Handshake • Cipher Suites</text>

  <rect x="770" y="125" width="260" height="120" rx="16" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="900" y="158" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#1f2937">Network Security</text>
  <text x="900" y="190" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Traceroute • DNS Risk</text>
  <text x="900" y="214" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Service Exposure • Segmentation</text>

  <rect x="250" y="330" width="260" height="120" rx="16" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="380" y="363" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#1f2937">IPSec</text>
  <text x="380" y="395" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Security Associations</text>
  <text x="380" y="419" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">Anti-Replay • Integrity</text>

  <rect x="590" y="330" width="260" height="120" rx="16" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="720" y="363" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#1f2937">Wireless Security</text>
  <text x="720" y="395" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">WEP Weaknesses</text>
  <text x="720" y="419" text-anchor="middle" font-family="Arial" font-size="14" fill="#374151">WPA2/WPA3 Reasoning</text>

  <line x1="330" y1="185" x2="420" y2="185" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="680" y1="185" x2="770" y2="185" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="475" y1="245" x2="410" y2="330" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="625" y1="245" x2="690" y2="330" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="260" y="520" width="580" height="54" rx="12" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="550" y="552" text-anchor="middle" font-family="Arial" font-size="16" font-weight="700" fill="#1f2937">Outcome: protocol reasoning, secure design tradeoffs, and public-safe documentation</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
